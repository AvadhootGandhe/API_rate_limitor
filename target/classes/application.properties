spring.application.name=rate-limiter-service

# SQLite configuration
spring.datasource.url=jdbc:sqlite:./rate_limiter.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.datasource.username=
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.community.dialect.SQLiteDialect

# Logging
logging.level.root=INFO
logging.level.com.ratelimiter=DEBUG

server.port=8080

# marketing_agency.db (run dataset.py) — second datasource in MarketingDataSourceConfig, JdbcTemplate only

